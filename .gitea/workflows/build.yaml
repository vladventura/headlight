name: Build and push image

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Login, Build, push
      #   run: |
      #     echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u vladventura --password-stdin
      #     docker build -t vladventura/headlight:latest .
      #     docker push vladventura/headlight:latest
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: index.docker.io
          username: vladventura
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        env:
          ACTIONS_RUNTIME_TOKEN: ''
        with:
          context: .
          push: true
          tags: docker.io/vladventura/headlight:latest