services:
  headlight:
    container_name: headlight
    image: vladventura/headlight:latest
    ports:
      - 7700:8080
    depends_on:
      - postgres
    restart: always
  postgres:
    container_name: postgres
    image: postgres:latest
    environment:
      - POSTGRES_USER=headlightuser
      - POSTGRES_PASSWORD=headlightpass*
      - POSTGRES_DB=headlight #optional (specify default database instead of $POSTGRES_DB)
    ports:
      - 5432:5432
    restart: always